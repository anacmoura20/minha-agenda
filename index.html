<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Agenda Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- IMPORTANDO AS DUAS FONTES: A NOVA (Playfair Display) E A ANTIGA (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        /* TEMA ESCURO (Padrão) */
        :root {
            --bg-page: #121212; 
            --bg-card: #1E1E1E; 
            --cor-destaque: #FF00E5;     
            --texto-principal: #EAEAEA; 
            --texto-secundario: #A0A0A0; 
            --cor-borda: #333333; 
            --sombra: rgba(255, 0, 229, 0.1);
        }

        /* TEMA CLARO */
        body.tema-claro {
            --bg-page: #FEF6F6; 
            --bg-card: #FFFFFF; 
            --cor-destaque: #FF8FAB;     
            --texto-principal: #4A4A4A; 
            --texto-secundario: #888888; 
            --cor-borda: #FADADD; 
            --sombra: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-page);
            color: var(--texto-principal);
            margin: 0; padding: 20px; padding-bottom: 80px;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 450px; width: 100%;
            background: var(--bg-card); padding: 30px;
            border-radius: 16px; border: 1px solid var(--cor-borda);
            box-shadow: 0 0 25px var(--sombra); transition: background-color 0.3s;
        }
        
        h2, h3 { text-align: center; color: var(--cor-destaque); margin-top: 0; }
        h3 { font-size: 1.2rem; text-align: left; margin-top: 25px; border-bottom: 1px solid var(--cor-borda); padding-bottom: 5px;}

        /* ===== ESTILO ATUALIZADO PARA O RELÓGIO ===== */
        #bloco-relogio { text-align: center; margin-bottom: 20px; }
        #hora-atual {
            font-family: 'Playfair Display', serif; /* A FONTE NOVA E ELEGANTE */
            font-size: 3.5rem; /* Maior para dar destaque */
            color: var(--texto-principal);
            margin: 0;
            line-height: 2;
        }
        #data-atual {
            font-size: 0.9rem;
            color: var(--texto-secundario);
            text-transform: capitalize;
        }


        input[type="text"], input[type="email"], input[type="password"], input[type="datetime-local"], select { 
            width: calc(100% - 24px); padding: 12px; margin-bottom: 15px;
            border: 1px solid var(--cor-borda); border-radius: 10px;
            background-color: var(--bg-page); color: var(--texto-principal);
            font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s;
        }
        
        input:focus, select:focus { outline: none; border-color: var(--cor-destaque); }

        button {
            padding: 12px; font-weight: 700; border: none; cursor: pointer;
            border-radius: 10px; width: 100%; margin-bottom: 10px; transition: all 0.2s;
        }
        
        .btn-principal { background-color: var(--cor-destaque); color: var(--bg-page); }
        .btn-secundario { background-color: transparent; border: 1px solid var(--cor-destaque); color: var(--cor-destaque); }
        .btn-sair { background-color: transparent; color: var(--texto-secundario); margin-top: 20px; font-weight: 400; }
        button:hover { opacity: 0.85; }

        ul { list-style-type: none; padding: 0; margin-top: 10px; }
        
        li {
            padding: 12px; border: 1px solid var(--cor-borda); border-radius: 10px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; background-color: var(--bg-page); transition: background-color 0.3s;
        }

        .info-item { display: flex; flex-direction: column; flex-grow: 1; margin-left: 10px; }
        .data-hora-badge { font-size: 0.75rem; color: var(--cor-destaque); margin-top: 4px; }
        .riscado { text-decoration: line-through; color: var(--texto-secundario); opacity: 0.6; }
        .btn-excluir { background: none; border: none; color: var(--texto-secundario); font-size: 1.5rem; cursor: pointer; width: auto; padding: 0 5px; margin-bottom: 0;}
        .btn-excluir:hover { color: var(--cor-destaque); opacity: 1; }
        .escondido { display: none !important; }

        .btn-flutuante { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--cor-destaque); color: var(--bg-page); font-size: 35px; line-height: 1; text-align: center; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 100; transition: transform 0.2s; display: flex; justify-content: center; align-items: center; padding: 0; }
        .btn-flutuante:hover { transform: scale(1.1); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 1; transition: opacity 0.3s; }

        .btn-abrir-menu { position: absolute; top: 20px; left: 20px; background: transparent; border: none; font-size: 30px; color: var(--texto-principal); cursor: pointer; width: auto; padding: 0; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 240px; height: 100vh; background: var(--bg-card); box-shadow: 2px 0 15px rgba(0,0,0,0.5); transition: left 0.3s ease; z-index: 1000; padding: 20px; border-right: 1px solid var(--cor-borda); }
        .sidebar.aberta { left: 0; }
        .sidebar h3 { text-align: left; border: none; margin-bottom: 20px; }
        .btn-fechar-menu { background: transparent; border: none; font-size: 28px; color: var(--texto-principal); cursor: pointer; float: right; width: auto; padding: 0; margin-top: -5px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); opacity: 0; visibility: hidden; transition: opacity 0.3s; z-index: 999; }
        .overlay.ativa { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <button id="btnAbrirMenu" class="btn-abrir-menu">☰</button>

    <div id="sidebar" class="sidebar">
        <button id="btnFecharMenu" class="btn-fechar-menu">×</button>
        <h3>⚙️ Temas</h3>
        <button id="btnTemaEscuro" class="btn-secundario">🌙 Dark Neon</button>
        <button id="btnTemaClaro" class="btn-principal">🌸 Pink Light</button>
    </div>
    <div id="overlay" class="overlay"></div>

    <div id="telaLogin" class="container">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Seu e-mail">
        <input type="password" id="senha" placeholder="Sua senha">
        <button id="btnEntrar" class="btn-principal">Entrar</button>
        <button id="btnRegistrar" class="btn-secundario">Criar Conta</button>
    </div>

    <div id="telaAgenda" class="container escondido">
        <h2 id="tituloAgenda">Sua Agenda</h2>
        
        <!-- Bloco do Relógio ATUALIZADO -->
        <div id="bloco-relogio">
            <div id="hora-atual">00:00</div>
            <div id="data-atual">Carregando data...</div>
        </div>

        <h3>⏰ Compromissos</h3>
        <ul id="listaCompromissos"></ul>

        <h3>✅ Tarefas do Dia</h3>
        <ul id="listaTarefas"></ul>

        <button id="btnSair" class="btn-sair">Sair da Conta</button>
        <button id="btnAbrirModal" class="btn-flutuante">+</button>
    </div>

    <div id="modalNovoItem" class="modal-overlay escondido">
        <div class="container">
            <h2 style="margin-bottom: 20px;">Novo Item</h2>
            <select id="tipoItemModal">
                <option value="compromisso">⏰ Compromisso</option>
                <option value="tarefa">✅ Tarefa</option>
            </select>
            <input type="text" id="nomeItemModal" placeholder="O que você precisa fazer/lembrar?">
            <input type="datetime-local" id="dataHoraModal">
            <button id="btnSalvarModal" class="btn-principal">Salvar</button>
            <button id="btnCancelarModal" class="btn-secundario">Cancelar</button>
        </div>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = { /* ... SUAS CONFIGURAÇÕES DO FIREBASE ... */
      apiKey: "AIzaSyClPqOh6AiRTi8Dca0qT0CM4vHwGFWm35k",
      authDomain: "app-agenda-19147.firebaseapp.com",
      projectId: "app-agenda-19147",
      storageBucket: "app-agenda-19147.firebasestorage.app",
      messagingSenderId: "1039485282986",
      appId: "1:1039485282986:web:e4b68ce7a10a9f96243ed3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let itensNaMemoria = []; 

  // --- LÓGICA DO RELÓGIO ATUALIZADA ---
  function atualizarRelogio() {
      const agora = new Date();
      // Atualiza a HORA (com a fonte nova)
      document.getElementById("hora-atual").innerText = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      // Atualiza a DATA (com a fonte normal)
      document.getElementById("data-atual").innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  }
  setInterval(atualizarRelogio, 1000); 
  atualizarRelogio();

  // O restante do seu código JavaScript continua exatamente o mesmo...
  const telaLogin = document.getElementById("telaLogin"), telaAgenda = document.getElementById("telaAgenda");
  const sidebar = document.getElementById("sidebar"), overlay = document.getElementById("overlay");
  document.getElementById("btnAbrirMenu").addEventListener("click", () => { sidebar.classList.add("aberta"); overlay.classList.add("ativa"); });
  const fecharSidebar = () => { sidebar.classList.remove("aberta"); overlay.classList.remove("ativa"); };
  document.getElementById("btnFecharMenu").addEventListener("click", fecharSidebar); overlay.addEventListener("click", fecharSidebar);
  const aplicarTema = (tema) => { document.body.classList.toggle("tema-claro", tema === "claro"); localStorage.setItem("meuTemaEscolhido", tema); };
  const temaSalvo = localStorage.getItem("meuTemaEscolhido"); if (temaSalvo) aplicarTema(temaSalvo);
  document.getElementById("btnTemaClaro").addEventListener("click", () => aplicarTema("claro"));
  document.getElementById("btnTemaEscuro").addEventListener("click", () => aplicarTema("escuro"));
  const modalNovoItem = document.getElementById("modalNovoItem");
  document.getElementById("btnAbrirModal").addEventListener("click", () => { document.getElementById("nomeItemModal").value = ""; document.getElementById("dataHoraModal").value = ""; modalNovoItem.classList.remove("escondido"); });
  document.getElementById("btnCancelarModal").addEventListener("click", () => { modalNovoItem.classList.add("escondido"); });
  document.getElementById("btnRegistrar").addEventListener("click", async () => { try { await createUserWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("senha").value); alert("Conta criada!"); } catch (e) { alert("Erro: " + e.message); } });
  document.getElementById("btnEntrar").addEventListener("click", async () => { try { await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("senha").value); } catch (e) { alert("Erro ao entrar!"); } });
  document.getElementById("btnSair").addEventListener("click", () => signOut(auth));
  onAuthStateChanged(auth, (user) => { if (user) { telaLogin.classList.add("escondido"); telaAgenda.classList.remove("escondido"); document.getElementById("tituloAgenda").textContent = `Agenda de ${user.email.split('@')[0]}`; carregarTudo(user.uid); } else { telaLogin.classList.remove("escondido"); telaAgenda.classList.add("escondido"); } });
  async function carregarTudo(userId) { const listaComp = document.getElementById("listaCompromissos"), listaTar = document.getElementById("listaTarefas"); listaComp.innerHTML = ""; listaTar.innerHTML = ""; itensNaMemoria = []; const querySnapshot = await getDocs(query(collection(db, "itens"), where("userId", "==", userId))); let listaTemporaria = []; querySnapshot.forEach((doc) => listaTemporaria.push({ id: doc.id, ...doc.data() })); listaTemporaria.sort((a, b) => (a.concluida === b.concluida) ? 0 : a.concluida ? 1 : -1); listaTemporaria.forEach((item) => { itensNaMemoria.push(item); let novoElemento = document.createElement("li"); let dataVisual = item.dataHoraLembrete ? new Date(item.dataHoraLembrete).toLocaleString('pt-BR', {day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'}) : "Sem horário"; novoElemento.innerHTML = `<input type="checkbox" class="check-status" data-id="${item.id}" data-status="${item.concluida}" ${item.concluida ? "checked" : ""}> <div class="info-item ${item.concluida ? "riscado" : ""}"> <span>${item.nome}</span> <span class="data-hora-badge">🕒 ${dataVisual}</span> </div> <button class="btn-excluir" data-id="${item.id}">×</button>`; if (item.tipo === "compromisso") listaComp.appendChild(novoElemento); else listaTar.appendChild(novoElemento); }); }
  document.getElementById("btnSalvarModal").addEventListener("click", async () => { const user = auth.currentUser; if (!user) return; const tipo = document.getElementById("tipoItemModal").value; const nome = document.getElementById("nomeItemModal").value.trim(); const hora = document.getElementById("dataHoraModal").value; if (nome === "") return; try { await addDoc(collection(db, "itens"), { nome: nome, tipo: tipo, concluida: false, dataHoraLembrete: hora, userId: user.uid }); modalNovoItem.classList.add("escondido"); carregarTudo(user.uid); } catch (e) { console.error(e); } });
  document.addEventListener("click", async (event) => { const user = auth.currentUser; if (!user) return; if (event.target.classList.contains("btn-excluir")) { if (confirm("Excluir item?")) { await deleteDoc(doc(db, "itens", event.target.getAttribute("data-id"))); carregarTudo(user.uid); } } if (event.target.classList.contains("check-status")) { await updateDoc(doc(db, "itens", event.target.getAttribute("data-id")), { concluida: !(event.target.getAttribute("data-status") === "true") }); carregarTudo(user.uid); } });
  setInterval(() => { const agora = new Date(); const dataAtualFormatada = agora.getFullYear() + "-" + String(agora.getMonth() + 1).padStart(2, '0') + "-" + String(agora.getDate()).padStart(2, '0') + "T" + String(agora.getHours()).padStart(2, '0') + ":" + String(agora.getMinutes()).padStart(2, '0'); itensNaMemoria.forEach(item => { if (!item.concluida && item.dataHoraLembrete === dataAtualFormatada) { alert(`🔔 LEMBRETE: ${item.tipo.toUpperCase()}!\n\nVocê tem algo agendado agora: ${item.nome}`); } }); }, 60000);
</script>

</body>
</html>
